{% extends "blog\base.html" %}

{% block content %}
    <div class="post-detail">
        <h2>Delete Post</h2>
        <div class="post-item">
            <p>
                Are you sure you want to delete this post:
                <strong>"{{ post.title }}" ?</strong>
            </p>

            <div class="post-actions">
                <form method="post">
                    {% csrf_token %}
                    <div class="actions">
                        <button type="submit" class="btn btn-danger">
                            Yes, Delete
                        </button>

                        <a href="{% url 'posts' %}" class="btn btn-ghost">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>
{% endblock %}
